# Optional container baseline for the scale-to-zero / cold-start comparison.
# Knative provides native scale-to-zero (Activator buffers the first request).
# Deploy this to compare Knative's scale-from-zero latency against SpinKube.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: hello-container
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "0"
    spec:
      containers:
        - image: ttl.sh/hello-container:24h
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "200m"
              memory: "64Mi"
