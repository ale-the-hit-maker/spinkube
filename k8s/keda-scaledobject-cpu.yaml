# CPU-based elasticity (used by the throughput test).
# NOTE: the CPU scaler keeps minReplicaCount >= 1: CPU/memory scalers in KEDA
# cannot scale to zero. For true scale-to-zero use keda-http-scaledobject.yaml.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: hello-spin
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hello-spin          # Deployment generated by the Spin Operator
  minReplicaCount: 1
  maxReplicaCount: 10
  cooldownPeriod: 30
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: "50"
