spin_manifest_version = 2

[application]
name = "hello-spin"
version = "0.1.0"
authors = ["Alessandro Villani"]
description = "Minimal HTTP API used to benchmark SpinKube vs containers."

[[trigger.http]]
route = "/..."
component = "hello"

[component.hello]
source = "main.wasm"
# Enable the default key-value store (used by the /count endpoint).
key_value_stores = ["default"]
allowed_outbound_hosts = []

[component.hello.build]
command = "tinygo build -target=wasi -gc=leaking -no-debug -o main.wasm main.go"
watch = ["*.go", "go.mod"]
